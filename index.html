
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia dos Namorados ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
        }

        body {
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            font-family: 'Segoe UI', sans-serif;

            display: flex;
            align-items: center;
            justify-content: center;

            overflow: hidden;
            position: relative;

            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: white;
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 15px;
            text-shadow: 0 3px 10px rgba(0, 0, 0, .3);
        }

        .subtitle {
            color: white;
            font-size: clamp(1rem, 2vw, 1.3rem);
            margin-bottom: 25px;
            opacity: .95;
        }

        .photo-frame {
            width: 100%;
            height: min(70vh, 700px);

            background: rgba(255, 255, 255, 0.95);

            border-radius: 25px;

            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.25);

            position: relative;
            overflow: hidden;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 15px;
        }

        .photo-frame img {
            position: absolute;

            max-width: calc(100% - 30px);
            max-height: calc(100% - 30px);

            width: auto;
            height: auto;

            object-fit: contain;

            border-radius: 15px;

            opacity: 0;

            transition: opacity 1.5s ease;

            transform: scale(1);
        }

        .photo-frame img.active {
            opacity: 1;
            animation: kenburns 6s ease-in-out forwards;
        }

        @keyframes kenburns {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.06);
            }
        }

        .message {
            margin-top: 25px;
            color: white;
            font-size: clamp(1rem, 2vw, 1.4rem);
            font-weight: 300;
            text-shadow: 0 2px 8px rgba(0,0,0,.25);
        }

        .signature {
            margin-top: 12px;
            color: white;
            font-style: italic;
            opacity: 0.9;
            font-size: clamp(.9rem, 2vw, 1.1rem);
        }

        .heart {
            position: absolute;
            user-select: none;
            pointer-events: none;

            color: rgba(255, 255, 255, 0.75);

            animation: float linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            to {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {

            body {
                padding: 15px;
            }

            .photo-frame {
                height: 60vh;
            }
        }

        @media (max-width: 480px) {

            .photo-frame {
                height: 50vh;
            }

            .message {
                margin-top: 20px;
            }
        }
    </style>
</head>
